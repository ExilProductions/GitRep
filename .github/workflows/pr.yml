name: PR Checks

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'index.html'
              - 'vite.config.*'
              - 'tailwind.config.*'
              - 'tsconfig.json'
            server:
              - 'server/**'
              - 'tsconfig.server.json'

  pr-size:
    name: PR Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate PR size
        id: size
        run: |
          ADDITIONS=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | grep -oP '\d+ insertion' | grep -oP '\d+' || echo 0)
          DELETIONS=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | grep -oP '\d+ deletion' | grep -oP '\d+' || echo 0)
          TOTAL=$((ADDITIONS + DELETIONS))
          if [ "$TOTAL" -lt 50 ]; then
            echo "label=size/S" >> "$GITHUB_OUTPUT"
          elif [ "$TOTAL" -lt 200 ]; then
            echo "label=size/M" >> "$GITHUB_OUTPUT"
          elif [ "$TOTAL" -lt 500 ]; then
            echo "label=size/L" >> "$GITHUB_OUTPUT"
          else
            echo "label=size/XL" >> "$GITHUB_OUTPUT"
          fi
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Comment PR size
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-size
          message: |
            **PR Size:** ${{ steps.size.outputs.label }} (${{ steps.size.outputs.total }} lines changed)

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: pnpm build

  server-check:
    name: Server Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: Build
        run: pnpm build:server
